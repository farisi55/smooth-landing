# Cloudflare configuration for the static Next.js export.
name = "smooth-ai"
compatibility_date = "2026-06-22"

# Cloudflare Workers Static Assets.
# This makes the dashboard deploy command `npx wrangler deploy` work.
[assets]
directory = "./out"
not_found_handling = "404-page"

# Cloudflare Pages can still deploy this project with:
# npx wrangler pages deploy out --project-name smooth-ai
